<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" fill="none" role="img" aria-hidden="true">
  <defs>
    <radialGradient id="canopyGlow" cx="50%" cy="36%" r="50%">
      <stop offset="0%" stop-color="#c8e898" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#7a9a58" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#2c3f29" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="hollowGlow" cx="50%" cy="58%" r="22%">
      <stop offset="0%" stop-color="#fff3cf"/>
      <stop offset="45%" stop-color="#ffb24d" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#b3361f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="trunk" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#b98f5c"/>
      <stop offset="40%" stop-color="#6b4a2b"/>
      <stop offset="100%" stop-color="#2e1d0f"/>
    </linearGradient>
    <linearGradient id="canopy" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#b8d878"/>
      <stop offset="45%" stop-color="#7d9a58"/>
      <stop offset="100%" stop-color="#3c5234"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- distant silhouettes (transparent edges — no solid backdrop) -->
  <ellipse cx="160" cy="560" rx="120" ry="240" fill="#1d2e20" opacity="0.35"/>
  <ellipse cx="1040" cy="570" rx="130" ry="250" fill="#162018" opacity="0.4"/>
  <ellipse cx="400" cy="640" rx="90" ry="180" fill="#142016" opacity="0.28"/>
  <ellipse cx="800" cy="630" rx="100" ry="200" fill="#142016" opacity="0.28"/>

  <!-- canopy -->
  <ellipse cx="600" cy="280" rx="440" ry="270" fill="url(#canopy)" opacity="0.92"/>
  <ellipse cx="370" cy="320" rx="230" ry="175" fill="#5b7340" opacity="0.88"/>
  <ellipse cx="830" cy="310" rx="250" ry="185" fill="#526838" opacity="0.88"/>
  <ellipse cx="600" cy="240" rx="310" ry="195" fill="#8fae64" opacity="0.75"/>
  <ellipse cx="600" cy="295" rx="390" ry="215" fill="url(#canopyGlow)"/>

  <!-- firefly specks -->
  <g fill="#f5c451" opacity="0.9" filter="url(#glow)">
    <circle cx="420" cy="210" r="3.5"/><circle cx="510" cy="170" r="3"/><circle cx="680" cy="185" r="3.5"/>
    <circle cx="760" cy="230" r="2.5"/><circle cx="340" cy="270" r="3"/><circle cx="880" cy="260" r="2.5"/>
    <circle cx="560" cy="140" r="2.5"/><circle cx="640" cy="155" r="3"/><circle cx="720" cy="300" r="2.5"/>
    <circle cx="480" cy="300" r="2.5"/><circle cx="820" cy="180" r="3"/><circle cx="390" cy="200" r="2.5"/>
  </g>

  <!-- trunk -->
  <path d="M600 870 C510 870 455 785 440 680 C425 575 448 495 478 415 C498 355 512 300 528 255 C540 228 560 215 600 215 C640 215 660 228 672 255 C688 300 702 355 722 415 C752 495 775 575 760 680 C745 785 690 870 600 870Z" fill="url(#trunk)"/>
  <path d="M575 420 Q560 540 550 660" stroke="#221409" stroke-width="5" opacity="0.2" stroke-linecap="round"/>
  <path d="M625 400 Q640 540 650 670" stroke="#221409" stroke-width="6" opacity="0.18" stroke-linecap="round"/>

  <!-- hollow doorway -->
  <path d="M600 565 C560 565 535 598 535 642 C535 692 560 725 600 725 C640 725 665 692 665 642 C665 598 640 565 600 565Z" fill="#120a06"/>
  <ellipse cx="600" cy="640" rx="48" ry="58" fill="url(#hollowGlow)" opacity="0.95"/>

  <!-- roots -->
  <path d="M440 680 C375 725 310 770 250 805 C295 780 360 745 415 715 C445 698 465 692 440 680Z" fill="#3f2c1a" opacity="0.9"/>
  <path d="M760 680 C825 725 890 770 950 805 C905 780 840 745 785 715 C755 698 735 692 760 680Z" fill="#3f2c1a" opacity="0.9"/>
  <path d="M515 770 C492 835 482 875 472 900 C505 872 528 830 538 788 C544 766 532 755 515 770Z" fill="#2e1d0f" opacity="0.85"/>
  <path d="M685 770 C708 835 718 875 728 900 C695 872 672 830 662 788 C656 766 668 755 685 770Z" fill="#2e1d0f" opacity="0.85"/>

  <!-- moss -->
  <ellipse cx="350" cy="785" rx="52" ry="18" fill="#5b6b3f" opacity="0.65"/>
  <ellipse cx="850" cy="790" rx="56" ry="20" fill="#5b6b3f" opacity="0.6"/>
  <ellipse cx="600" cy="855" rx="95" ry="24" fill="#3c5234" opacity="0.55"/>

  <!-- toadstools -->
  <g opacity="0.95">
    <ellipse cx="320" cy="815" rx="15" ry="6" fill="#efe1c2" opacity="0.65"/>
    <path d="M320 815 C307 798 311 782 320 780 C329 782 333 798 320 815Z" fill="#cf4327"/>
    <circle cx="316" cy="790" r="2.2" fill="#fbf3df"/><circle cx="324" cy="786" r="1.8" fill="#fbf3df"/>
    <ellipse cx="880" cy="820" rx="13" ry="5" fill="#efe1c2" opacity="0.6"/>
    <path d="M880 820 C870 806 873 794 880 792 C887 794 890 806 880 820Z" fill="#b3361f"/>
    <circle cx="877" cy="796" r="1.8" fill="#fbf3df"/>
  </g>
</svg>
